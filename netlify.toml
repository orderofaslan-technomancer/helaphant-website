[build]
  publish = "."
  # No build command needed - pure static HTML/JS

[dev]
  publish = "."
  port = 8888

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Optional: Redirects if we add more pages later
# [[redirects]]
#   from = "/admin"
#   to = "/admin.html"
#   status = 200
